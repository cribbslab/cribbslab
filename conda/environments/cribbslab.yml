name: cribbslab

channels:
- conda-forge
- bioconda
- defaults

dependencies:
# python dependencies
- cgatcore
- nose
- pycodestyle
- python
- gevent
- numpy
- pandas
- paramiko
- pep8
- pytest
- pytest-pep8
- drmaa
- pyyaml>=5.1
- ruffus
- setuptools
- six
- sqlalchemy
- kallisto
# Misc dependencies
- coreutils
- nomkl
- time
- boto3
- google-cloud-storage
- google-cloud-sdk
- ftputil
- pysftp
- apsw
- kallisto
- samtools
- multiqc
- fastqc
- bowtie2
#
# NOTE: pipeline_sclong (single-cell long-read / FLAMES) dependencies live in
# conda/environments/sclong.yml. They are kept separate because several
# Bioconductor packages (e.g. bioconductor-flames) have no osx-arm64 build,
# which would break this environment on Apple Silicon / CI macOS runners.
